name: pr-check

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: mvn -B clean package -DskipTests
      - name: Docker 이미지 빌드 테스트
        run: docker build -t front-service:pr-test .